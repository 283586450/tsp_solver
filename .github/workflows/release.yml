name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }} / release package
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_label: linux
            archive_ext: tar.gz
            preset: linux-gcc-release
          - os: macos-latest
            os_label: macos
            archive_ext: tar.gz
            preset: macos-clang-release
          - os: windows-latest
            os_label: windows
            archive_ext: zip
            preset: windows-msvc-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine project version
        shell: bash
        env:
          OS_LABEL: ${{ matrix.os_label }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          content = pathlib.Path("CMakeLists.txt").read_text(encoding="utf-8")
          match = re.search(r"project\(tsp_solver VERSION ([0-9]+\.[0-9]+\.[0-9]+)", content)
          if match is None:
              raise SystemExit("Unable to determine project version")
          arch_map = {
              "X64": "x64",
              "ARM64": "arm64",
          }
          arch = arch_map.get(os.environ.get("RUNNER_ARCH", ""), os.environ.get("RUNNER_ARCH", "").lower())
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"TSP_SOLVER_VERSION={match.group(1)}\n")
              handle.write(f"TSP_SOLVER_ARCH={arch}\n")
              handle.write(f"TSP_SOLVER_NATIVE_ASSET_NAME=tsp_solver-{os.environ['OS_LABEL']}-{arch}\n")
          PY

      - name: Set up MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Build binding distribution artifacts
        run: cmake --build --preset ${{ matrix.preset }} --target tsp_solver_python_wheel tsp_solver_java_jar tsp_solver_java_native_bundle

      - name: Verify release packaging smoke tests
        run: >-
          ctest --preset ${{ matrix.preset }} --output-on-failure
          -R "tsp_solver_python_package_smoke|tsp_solver_java_package_smoke"

      - name: Install staging files
        run: cmake --install build/${{ matrix.preset }} --prefix "${{ github.workspace }}/stage"

      - name: Create package directory
        shell: bash
        run: |
          mkdir -p dist
          cp -R stage dist/${TSP_SOLVER_NATIVE_ASSET_NAME}

      - name: Archive package
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import shutil

          asset_name = os.environ["TSP_SOLVER_NATIVE_ASSET_NAME"]
          archive_ext = "${{ matrix.archive_ext }}"
          base_name = pathlib.Path("dist") / asset_name
          if archive_ext == "zip":
              shutil.make_archive(str(base_name), "zip", root_dir="dist", base_dir=asset_name)
          else:
              shutil.make_archive(str(base_name), "gztar", root_dir="dist", base_dir=asset_name)
          PY

      - name: Collect binding artifacts
        shell: bash
        env:
          PUBLISH_JAVA_JAR: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import shutil

          dist_dir = pathlib.Path("dist")
          build_dir = pathlib.Path("build") / "${{ matrix.preset }}"
          version = os.environ["TSP_SOLVER_VERSION"]
          java_dist = build_dir / "bindings" / "java" / "dist"
          python_dist = build_dir / "bindings" / "python" / "dist"

          wheel = next(python_dist.glob("*.whl"))
          shutil.copy2(wheel, dist_dir / wheel.name)

          native_bundle = next(java_dist.glob(f"tsp-solver-java-native-*-{version}"))
          archive_format = "zip" if os.name == "nt" else "gztar"
          archive_base = dist_dir / native_bundle.name
          shutil.make_archive(str(archive_base), archive_format, root_dir=java_dist, base_dir=native_bundle.name)

          if os.environ["PUBLISH_JAVA_JAR"] == "true":
              jar = java_dist / f"tsp-solver-java-{version}.jar"
              shutil.copy2(jar, dist_dir / jar.name)
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.whl
            dist/*.jar
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
