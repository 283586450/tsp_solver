name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            preset: linux-gcc-debug
          - os: ubuntu-latest
            compiler: clang
            preset: linux-clang-debug
          - os: macos-latest
            compiler: clang
            preset: macos-clang-debug
          - os: windows-latest
            compiler: msvc
            preset: windows-msvc-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        if: matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  lint:
    name: lint / ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy

      - name: Configure
        run: cmake --preset linux-clang-debug

      - name: Build
        run: cmake --build --preset linux-clang-debug

      - name: Check formatting
        run: |
          files=$(git ls-files '*.cpp' '*.hpp')
          clang-format --dry-run --Werror $files

      - name: Run clang-tidy
        run: |
          clang-tidy -p build/linux-clang-debug src/algorithms/local_search.cpp --warnings-as-errors='*'
